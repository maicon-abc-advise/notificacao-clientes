services:
  postgres-templates:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: notificacao
      POSTGRES_PASSWORD: notificacao_dev
      POSTGRES_DB: notificacao
    volumes:
      - pg_templates_data:/var/lib/postgresql/data

  redis-local:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pg_templates_data:
