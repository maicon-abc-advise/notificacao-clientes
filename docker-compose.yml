services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile.local
    ports:
      - "8000:8000"
    environment:
      AMBIENTE: ${AMBIENTE:-local}
      API_KEY: ${API_KEY:-dev-change-me}
      USE_BIGDATACORP_MOCK: ${USE_BIGDATACORP_MOCK:-true}
      USE_ZENVIA_MOCK: ${USE_ZENVIA_MOCK:-true}
      REDIS_URL_TEST: ${REDIS_URL_TEST:-redis://redis:6379/0}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MENSAGENS_PROVEDOR_EMAIL: ${MENSAGENS_PROVEDOR_EMAIL:-zenvia}
      MENSAGENS_PROVEDOR_SMS: ${MENSAGENS_PROVEDOR_SMS:-zenvia}
      ZENVIA_API_BASE_URL_PROD: ${ZENVIA_API_BASE_URL_PROD:-https://api.zenvia.com}
      ZENVIA_API_TOKEN_PROD: ${ZENVIA_API_TOKEN_PROD:-}
      ZENVIA_EMAIL_FROM_PROD: ${ZENVIA_EMAIL_FROM_PROD:-}
      ZENVIA_SMS_FROM_PROD: ${ZENVIA_SMS_FROM_PROD:-}
    depends_on:
      - redis
